<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Prajna — AI-powered Hindi tutor. Sign in or create an account to begin your learning journey.">
  <title>Prajna — Sign In</title>
  <link rel="stylesheet" href="css/style.css">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>ज्ञ</text></svg>">
</head>
<body>
  <!-- Glow Blobs -->
  <div class="glow-blob"></div>
  <div class="glow-blob-top"></div>

  <!-- Navbar -->
  <nav class="navbar" id="navbar">
    <a href="login.html" class="nav-logo">
      <span class="brace">{</span><span class="name">prajna</span><span class="brace">}</span>
    </a>
    <div class="nav-right">
      <div class="nav-lang" id="navLangToggle">
        <button class="lang-btn active" data-lang="Hindi" onclick="setLanguage('Hindi')">हिन्दी</button>
        <button class="lang-btn" data-lang="English" onclick="setLanguage('English')">EN</button>
        <div class="lang-slider" id="langSlider"></div>
      </div>
      <a href="#" class="nav-link nav-link--ghost" onclick="switchTab('signin')">
        <span data-en="Already have an account?" data-hi="पहले से अकाउंट है?">Already have an account?</span> <span data-en="Sign in" data-hi="साइन इन">Sign in</span>
      </a>
    </div>
  </nav>

  <!-- Main -->
  <main class="login-page">
    <!-- LEFT COLUMN -->
    <section class="login-left">
      <p class="hero-label fade-up" data-en="your AI, your edge." data-hi="तुम्हारा AI, तुम्हारी ताकत।">your AI, your edge.</p>

      <div class="hero-heading fade-up">
        <div class="line-hindi">नमस्ते !</div>
        <div class="line-eng">I'm Prajna.</div>
      </div>

      <p class="hero-tagline fade-up" data-en="Ask anything. Learn everything." data-hi="कुछ भी पूछो, सब कुछ सीखो।">Ask anything. Learn everything.</p>

      <div class="hero-glyph hero-glyph--login fade-up" aria-hidden="true">ज्ञ</div>

      <div class="feature-pills fade-up" style="margin-top:32px;">
        <span class="feature-pill" data-en="🧠&nbsp; AI-powered tutor" data-hi="🧠&nbsp; AI शिक्षक">🧠&nbsp; AI-powered tutor</span>
        <span class="feature-pill" data-en="📚&nbsp; Every subject, one place" data-hi="📚&nbsp; सब विषय, एक जगह">📚&nbsp; Every subject, one place</span>
        <span class="feature-pill" data-en="⚡&nbsp; Fast &amp; deep modes" data-hi="⚡&nbsp; तेज़ और विस्तृत मोड">⚡&nbsp; Fast &amp; deep modes</span>
      </div>
    </section>

    <!-- RIGHT COLUMN -->
    <section class="login-right">
      <div class="auth-card">
        <!-- Logo -->
        <div class="auth-logo">
          <span class="nav-logo">
            <span class="brace">{</span><span class="name">prajna</span><span class="brace">}</span>
          </span>
        </div>
        <p class="auth-subtitle" data-en="Begin your journey" data-hi="अपना सफर शुरू करो">अपना सफर शुरू करो</p>

        <!-- Tabs -->
        <div class="tab-switcher" id="tabSwitcher">
          <button class="tab-btn active" data-tab="signin" id="tabSignin" onclick="switchTab('signin')" data-en="Sign In" data-hi="साइन इन">Sign In</button>
          <button class="tab-btn" data-tab="signup" id="tabSignup" onclick="switchTab('signup')" data-en="Sign Up" data-hi="साइन अप">Sign Up</button>
          <div class="tab-slider" id="tabSlider"></div>
        </div>

        <!-- Sign In Form -->
        <form id="formSignin" class="auth-form" onsubmit="handleSignin(event)">
          <div class="form-group">
            <label for="si-email" data-en="Name" data-hi="नाम">Name / नाम</label>
            <input type="text" id="si-email" class="form-input"
              placeholder="अपना नाम लिखो"
              data-placeholder-en="Enter your name"
              data-placeholder-hi="अपना नाम लिखो"
              required>
            <span class="field-error" id="si-email-err"></span>
          </div>
          <div class="form-group">
            <label for="si-password" data-en="Password" data-hi="पासवर्ड">Password</label>
            <input type="password" id="si-password" class="form-input"
              placeholder="••••••••"
              data-placeholder-en="••••••••"
              data-placeholder-hi="••••••••"
              required>
            <button type="button" class="toggle-pw" onclick="togglePw('si-password',this)">👁</button>
            <span class="field-error" id="si-password-err"></span>
          </div>
          <a href="#" class="forgot-link" data-en="Forgot password?" data-hi="पासवर्ड भूल गए?">Forgot password?</a>

          <button type="submit" class="btn-primary" data-en="Sign In&nbsp; →" data-hi="साइन इन&nbsp; →">Sign In&nbsp; →</button>
        </form>

        <!-- Sign Up Form -->
        <form id="formSignup" class="auth-form" style="display:none;" onsubmit="handleSignup(event)">
          <div class="form-group">
            <label for="su-name" data-en="Name" data-hi="नाम">Name / नाम</label>
            <input type="text" id="su-name" class="form-input"
              placeholder="अपना नाम लिखो"
              data-placeholder-en="Enter your name"
              data-placeholder-hi="अपना नाम लिखो"
              required>
            <span class="field-error" id="su-name-err"></span>
          </div>
          <div class="form-group" style="display:none;">
            <label for="su-email">Email</label>
            <input type="text" id="su-email" class="form-input" disabled>
            <span class="field-error" id="su-email-err"></span>
          </div>
          <div class="form-group">
            <label for="su-password" data-en="Password" data-hi="पासवर्ड">Password</label>
            <input type="password" id="su-password" class="form-input"
              placeholder="••••••••"
              data-placeholder-en="••••••••"
              data-placeholder-hi="••••••••"
              required>
            <button type="button" class="toggle-pw" onclick="togglePw('su-password',this)">👁</button>
            <span class="field-error" id="su-password-err"></span>
          </div>
          <div class="form-group">
            <label for="su-confirm" data-en="Confirm Password" data-hi="पासवर्ड दोबारा डालो">Confirm Password</label>
            <input type="password" id="su-confirm" class="form-input"
              placeholder="••••••••"
              data-placeholder-en="••••••••"
              data-placeholder-hi="••••••••"
              required>
            <button type="button" class="toggle-pw" onclick="togglePw('su-confirm',this)">👁</button>
            <span class="field-error" id="su-confirm-err"></span>
          </div>

          <button type="submit" class="btn-primary" style="margin-top:8px;" data-en="Create Account&nbsp; →" data-hi="अकाउंट बनाओ&nbsp; →">Create Account&nbsp; →</button>
        </form>
      </div>
    </section>
  </main>

  <script src="js/app.js"></script>
</body>
</html>
